<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Morkasa Dark Canvas Tokens</title>
    <style>
      :root {
        --brand-blue: #002fa7;
        --brand-blue-hover: #0644d8;
        --brand-blue-soft: rgba(0, 47, 167, 0.28);
        --accent-blue: #7da2ff;
        --bg: #050507;
        --panel: #0d0f14;
        --panel-muted: #11141b;
        --surface: #171b25;
        --ink: #f7f8ff;
        --muted: #a8afbf;
        --faint: #71798a;
        --border: rgba(255, 255, 255, 0.1);
        --green: #4fe08f;
        --amber: #f4ba4f;
        --red: #ff6c5f;
      }

      * {
        box-sizing: border-box;
        letter-spacing: 0;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header,
      section {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        padding: 14px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.2rem, 2vw, 1.6rem);
      }

      p {
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 12px;
      }

      section {
        padding: 14px;
      }

      .swatches {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .swatch {
        min-height: 86px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        background: var(--surface);
      }

      .chip {
        width: 100%;
        height: 30px;
        margin-bottom: 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      button,
      input {
        min-height: 38px;
        border-radius: 8px;
        font: inherit;
      }

      button {
        border: 1px solid var(--border);
        padding: 0 12px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.055);
      }

      button.primary {
        border-color: rgba(125, 162, 255, 0.62);
        color: #fff;
        background: var(--brand-blue);
      }

      input {
        min-width: 220px;
        border: 1px solid var(--border);
        padding: 0 11px;
        color: var(--ink);
        background: #050507;
      }

      .canvas {
        min-height: 260px;
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px),
          linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
          #07080c;
        background-size: 24px 24px;
      }

      @media (max-width: 760px) {
        .grid,
        .swatches {
          grid-template-columns: 1fr;
        }

        header {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <p>Morkasa</p>
          <h1>Dark Canvas Design Tokens</h1>
        </div>
        <button class="primary">Primary action</button>
      </header>
      <div class="grid">
        <section>
          <h2>Palette</h2>
          <div class="swatches">
            <div class="swatch"><div class="chip" style="background:#002fa7"></div>#002FA7</div>
            <div class="swatch"><div class="chip" style="background:#050507"></div>#050507</div>
            <div class="swatch"><div class="chip" style="background:#0d0f14"></div>#0D0F14</div>
            <div class="swatch"><div class="chip" style="background:#f7f8ff"></div>#F7F8FF</div>
          </div>
        </section>
        <section>
          <h2>Controls</h2>
          <div class="controls">
            <button class="primary">Export JSON</button>
            <button>Copy report</button>
            <input value="https://example.com" aria-label="URL preview" />
          </div>
          <div class="canvas" aria-label="Canvas preview"></div>
        </section>
      </div>
    </main>
  </body>
</html>
